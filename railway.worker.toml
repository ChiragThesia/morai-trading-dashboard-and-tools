# Railway config-as-code for the `worker` service (pg-boss runner; migrates on boot).
# Activate: Railway → worker → Settings → Config-as-code path = /railway.worker.toml
# No healthcheck — the worker has no HTTP surface; Railway treats it healthy once running.

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/worker/Dockerfile"
watchPatterns = ["apps/worker/**", "packages/**", "package.json", "bun.lock"]

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
