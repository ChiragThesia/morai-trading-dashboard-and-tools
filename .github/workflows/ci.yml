name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    name: Typecheck + Lint + Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test
        # GH-hosted Ubuntu runners include Docker; testcontainers Postgres contract test
        # runs with zero extra config (RESEARCH Pattern 5 / D-02).
        # Do NOT skip the Postgres contract suite — it is the D-02 gate.
