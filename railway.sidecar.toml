# Railway config-as-code for the `sidecar` service (Python FastAPI + schwab-py).
# Activate: Railway → sidecar → Settings → Config-as-code path = /railway.sidecar.toml
#
# GW-05: The sidecar MUST have NO public Railway domain.
# Settings → Networking → do NOT generate a public domain.
# Only apps/server and apps/worker reach the sidecar over the private network via:
#   SIDECAR_URL=http://${{sidecar.RAILWAY_PRIVATE_DOMAIN}}:${{sidecar.PORT}}
#
# Required env vars on this service (set in Railway dashboard):
#   DATABASE_URL          — direct connection (port 5432), NOT the 6543 pooler
#   TOKEN_ENCRYPTION_KEY  — same pgcrypto key as server + worker (>=32 chars)
#   SCHWAB_TRADER_APP_KEY / SCHWAB_TRADER_APP_SECRET
#   SCHWAB_MARKET_APP_KEY / SCHWAB_MARKET_APP_SECRET
#
# Required env vars on server + worker services (Railway reference syntax):
#   SIDECAR_URL=http://${{sidecar.RAILWAY_PRIVATE_DOMAIN}}:${{sidecar.PORT}}

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/sidecar/Dockerfile"
watchPatterns = ["apps/sidecar/**"]

[deploy]
healthcheckPath = "/sidecar/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
